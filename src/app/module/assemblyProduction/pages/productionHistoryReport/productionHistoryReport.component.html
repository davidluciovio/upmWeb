<section class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 xl:grid-cols-4 gap-2 p-4">
  <upm-title-page class="col-span-full" [titlePage]="'Reporte de Producción Historial'"/>
  <filter-production-history-report class="col-span-full" (onFilters)="Filters.set($event)"/> 
  <section class="col-span-full grid grid-cols-4 gap-4">
    <table-production-history-report class="col-span-2" [reportData]="Filters()" (onSelectedReport)="SelectedReport.set($event)"/> 
    @if (reportData$.hasValue()) {
      <chart-production-history-report class="col-span-2" />
      <!-- {{reportData$.value() | json}} -->
    } 
  </section>
</section>
