<section
  class="grid grid-cols-1 gap-2 p-4"
>
  <upm-title-page
    class="col-span-full"
    [titlePage]="'Reporte de Producción Historial'"
  />
  <filter-production-history-report
    class="col-span-full"
    (onFilters)="Filters.set($event)"
  />
  <section class="col-span-full grid grid-cols-24 gap-2">
    <table-production-history-report
      class="col-span-10"
      [reportData]="Filters()"
      (onSelectedReport)="SelectedReport.set($event)"
    />
    @if (reportData$.hasValue() && reportData$.value().length > 0 && SelectedReport() != null ) {
    <section class="col-span-14 flex flex-col gap-2">
      <upm-subtitle-page [titlePage]="SelectedReport()!.line.lineName" [subtitlePage]="SelectedReport()!.model.modelDescription" [descriptionPage]="DescriptionPage()"/>
      <chart-production-history-report />

    </section>
    <!-- {{reportData$.value() | json}} -->
    }
  </section>
</section>
