@if (chartData().length > 0) {
<section class="w-full p-4 bg-slate-100 dark:bg-slate-700 rounded-lg shadow-md">
  <apx-chart
    #chartProductionReport
    [chart]="chart()"
    [series]="series()"
    [labels]="labels"
    [stroke]="{ width: 3 }"
    [theme]=" theme()"
    [dataLabels]="dataLabels"
  />
</section>
}
