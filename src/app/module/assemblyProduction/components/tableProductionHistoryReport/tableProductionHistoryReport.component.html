@if (tableData().length > 0) {
<section class="p-2 bg-slate-100 dark:bg-slate-700 rounded-lg shadow-md">
  <p-table
    [value]="tableData()"
    [resizableColumns]="true"
    [paginator]="true"
    [rows]="9"
    [paginatorStyleClass]="'bg-slate-100! dark:bg-slate-700 rounded-lg shadow-md '"
  >
    <ng-template #header>
      <tr [classList]="'bg-sky-500'">
        <th class="bg-slate-100! dark:bg-slate-700!">Líder</th>
        <th class="bg-slate-100! dark:bg-slate-700!">Línea</th>
        <th class="bg-slate-100! dark:bg-slate-700!">Modelo</th>
        <th class="bg-slate-100! dark:bg-slate-700!">Turno</th>
        <th class="bg-slate-100! dark:bg-slate-700!">Fecha</th>
        <th class="bg-slate-100! dark:bg-slate-700!">Reporte</th>
      </tr>
    </ng-template>
    <ng-template #body let-row>
      <tr >
        <td class="bg-slate-100 dark:bg-slate-700">
          {{ row.lider.liderName }}
        </td>
        <td class="bg-slate-100 dark:bg-slate-700">{{ row.line.lineName }}</td>
        <td class="bg-slate-100 dark:bg-slate-700">
          {{ row.model.modelDescription }}
        </td>
        <td class="bg-slate-100 dark:bg-slate-700">
          {{ row.shift.description }}
        </td>
        <td class="bg-slate-100 dark:bg-slate-700">
          {{ row.dateStart | date : "dd/MM/yyyy HH:mm:ss a" }}
        </td>
        <td class="bg-slate-100 dark:bg-slate-700">
          <p-button (onClick)="clicOpenReport(row)">
            <span
              style="font-size: 1.5rem; font-weight: 700"
              class="material-symbols-outlined"
              >chat_paste_go</span
            >
          </p-button>
        </td>
      </tr>
    </ng-template>
  </p-table>
</section>
}
