<section
  class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 xl:grid-cols-4 gap-4 py-4"
>
  @for (item of Modules(); track $index) {
  <a
    class="flex flex-col items-center justify-center w-full h-32 p-4 font-roboto bg-slate-100 dark:bg-slate-700 rounded-xl shadow-md hover:shadow-lg transition-transform transform hover:scale-105"
    [routerLink]="item.route"
  >
    <span
      style="font-size: 2.5rem; font-weight: bold;"
      class="material-symbols-outlined text-slate-800 dark:text-slate-200"
      >{{ item.icon }}</span
    >
    <h2 class="text-xl font-bold text-slate-800 dark:text-slate-200">
      {{ item.title }}
    </h2>
  </a>
  }
</section>
