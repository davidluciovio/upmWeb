@if (!productCategories$.isLoading()) {
  @if (productCategories$.hasValue()) {
    <table-crud 
      [data]="productCategories$.value()!" 
      [columns]="columns" 
      (create)="openCreateModal()" 
      (edit)="openEditModal($event)" 
      (delete)="onDelete($event)">
    </table-crud>
  }
} @else {
  <div class="flex flex-col items-center justify-center h-full">
    <span class="loading loading-spinner loading-lg"></span>
    <span class="text-lg font-semibold text-base-content">Cargando datos...</span>
  </div>
}

<p-dialog
  [(visible)]="dialogVisible"
  [modal]="true"
  [style]="{ width: '450px' }"
  [header]="isEditMode ? 'Editar CategorÃ­a' : 'Agregar Nueva CategorÃ­a'"
  [draggable]="false"
  [resizable]="false"
  styleClass="p-fluid bg-surface-50 dark:bg-surface-900"
>
  <div [formGroup]="form" class="flex flex-col gap-4 mt-2">
    <div class="flex flex-col gap-2">
      <label for="productCategoryDescription" class="font-medium text-surface-600 dark:text-surface-200">DescripciÃ³n</label>
      <input pInputText id="productCategoryDescription" formControlName="productCategoryDescription" />
    </div>

    <div class="flex flex-col gap-2">
      <label for="acount" class="font-medium text-surface-600 dark:text-surface-200">Cuenta</label>
      <input pInputText id="acount" formControlName="acount" />
    </div>

    <div class="flex flex-col gap-2">
      <label for="profitId" class="font-medium text-surface-600 dark:text-surface-200">Profit</label>
      <p-select 
        id="profitId" 
        formControlName="profitId" 
        [options]="profits$.value() || []" 
        optionLabel="profitDescription" 
        optionValue="id" 
        placeholder="Seleccione un Profit"
        appendTo="body">
      </p-select>
    </div>

    <div class="flex flex-col gap-3 mt-2 bg-surface-50 dark:bg-surface-800 p-3 rounded-lg border border-surface-200 dark:border-surface-700">
      <div class="flex items-center justify-between">
        <label for="active" class="font-medium text-surface-700 dark:text-surface-100">Activo</label>
        <p-toggleSwitch inputId="active" formControlName="active"></p-toggleSwitch>
      </div>
    </div>
  </div>

  <ng-template pTemplate="footer">
    <div class="flex justify-end gap-2 mt-4">
      <p-button label="Cancelar" icon="pi pi-times" [text]="true" severity="secondary" (onClick)="closeModal()"></p-button>
      <p-button label="Guardar" icon="pi pi-check" severity="primary" (onClick)="save()" [disabled]="form.invalid"></p-button>
    </div>
  </ng-template>
</p-dialog>
